<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}训练分析系统{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ base }}/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="{{ base }}/" class="logo">训练分析系统</a>
        <div class="nav-links">
            <a href="{{ base }}/" {% if request.url.path == '/' %}class="active"{% endif %}>仪表板</a>
            <a href="{{ base }}/sessions" {% if '/sessions' in request.url.path %}class="active"{% endif %}>训练记录</a>
            <a href="{{ base }}/weekly" {% if request.url.path == '/weekly' %}class="active"{% endif %}>周视图</a>
            <a href="{{ base }}/ai-insights" {% if request.url.path == '/ai-insights' %}class="active"{% endif %}>AI分析</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>window.BASE_PATH = '{{ base }}';</script>
    <script src="{{ base }}/static/charts.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
